<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Base Movement Buttons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Helper to center the side/middle buttons perfectly */
        .translate-middle-y { transform: translateY(-50%); }
        .translate-middle-x { transform: translateX(-50%); }
    </style>
</head>
<body>
<button class="btn btn-primary position-fixed top-0 start-0 m-3" id="btn-top-left">TOP_LEFT</button>
<button class="btn btn-primary position-fixed top-0 start-50 translate-middle-x mt-3" id="btn-top">TOP</button>
<button class="btn btn-primary position-fixed top-0 end-0 m-3" id="btn-top-right">TOP_RIGHT</button>

<button class="btn btn-primary position-fixed top-50 start-0 translate-middle-y ms-3" id="btn-left">LEFT</button>
<button class="btn btn-primary position-fixed top-50 end-0 translate-middle-y me-3" id="btn-right">RIGHT</button>

<button class="btn btn-primary position-fixed bottom-0 start-0 m-3" id="btn-bottom-left">BOTTOM_LEFT</button>
<button class="btn btn-primary position-fixed bottom-0 start-50 translate-middle-x mb-3" id="btn-bottom">BOTTOM</button>
<button class="btn btn-primary position-fixed bottom-0 end-0 m-3" id="btn-bottom-right">BOTTOM_RIGHT</button>


<!--Room navigatie Knoppen -->
<button onclick="previousRoom()"><</button>
<button onclick="nextRoom()">></button>

<script>
    const rooms = [
        "hallway_interactable_texts.html",
        "living_room_interactable_texts.html",
        "movement_buttons_base.html",
        "nursery.html"
    ];

    // Zoek in welke pagina (room) we momenteel zitten
    let currentIndex = rooms.findIndex(room =>
        window.location.href.includes(room) // checkt of de URL deze bestandsnaam bevat
    );

    // Functie om naar de volgende pagina te gaan
    function nextRoom() {
        // +1 = volgende pagina
        // % rooms.length = zorgt dat we terug naar het begin gaan als we op het einde zitten
        let nextIndex = (currentIndex + 1) % rooms.length;

        // Ga naar die pagina
        window.location.href = rooms[nextIndex];
    }

    // Functie om naar de vorige pagina te gaan
    function previousRoom() {
        // -1 = vorige pagina
        // + rooms.length = voorkomt negatieve index
        // % rooms.length = zorgt dat we naar het einde gaan als we op het begin zitten
        let prevIndex = (currentIndex - 1 + rooms.length) % rooms.length;

        // Ga naar die pagina
        window.location.href = rooms[prevIndex];
    }
</script>
</body>
</html>
