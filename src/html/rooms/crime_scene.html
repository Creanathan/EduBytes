<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Crime Scene - EduBytes</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/rooms.css">
    <style>
        .room-background { background-image: url('../../assets/rooms/Gemini_Generated_Image_6ja0d6ja0d6ja0d6.png'); }
        #obj-body { top: 75%; left: 25%; width: 20%; height: 20%; }
        #obj-desk   { top: 52%; left: 58%; width: 27%; height: 30%; }
        #obj-tablet { top: 62%; left: 65%; width: 8%; height: 12%; }

        /* Bureau Overlay */
        #bureau-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000;
            display: none; align-items: center; justify-content: center;
        }
        #bureau-container {
            position: relative;
            width: 90vw; height: 50.625vw; /* 16:9 aspect ratio */
            max-height: 90vh; max-width: 160vh;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-image: url('../../assets/rooms/crime_scene_bureau_USB.png');
        }
        #usb-hitbox {
            position: absolute;
            top: 55%; left: 45%; width: 15%; height: 15%; /* Approximate */
            cursor: pointer;
        }
    </style>
</head>
<body class="bg-dark text-white">

    <div class="room-background"></div>
    
    <div class="interactable-layer">
        <div id="obj-body"   class="clickable-object" onclick="showInteraction('body')" title="Investigate Victim"></div>
        <div id="obj-desk"   class="clickable-object" onclick="openBureau()" title="Examine Desk Area"></div>
        <div id="obj-tablet" class="clickable-object" onclick="openTabletWithNarrative()" title="Examine Police Tablet"></div>
    </div>

    <h1>Crime Scene</h1>

    <!-- UI Buttons -->
    <button class="btn btn-primary ui-button position-fixed bottom-0 start-50 translate-middle-x mb-4" id="btn-bottom" onclick="goToLocation('hallway.html')"></button>

    <!-- Bureau Close-up Overlay -->
    <div id="bureau-overlay">
        <div id="bureau-container">
            <div id="usb-hitbox" class="clickable-object" onclick="pickupUSB()" title="Take USB Stick"></div>
        </div>
        <button class="btn btn-outline-light position-absolute top-0 end-0 m-4" style="z-index: 5001;" onclick="closeBureau()">← Back to Room</button>
    </div>

    <script src="../../js/services/gamestate.js"></script>
    <script src="../../js/services/routing_guard.js"></script>
    <script src="../../js/services/responsive.js"></script>
    <script src="../../js/components/device_block.js"></script>
    <script src="../../js/components/movement.js"></script>
    <script src="../../js/components/audio.js"></script>
    <script src="../../js/components/game_menu.js"></script>
    <script src="../../js/components/tablet_widget.js"></script>
    <script src="../../js/services/inventory.js"></script>
    <script src="../../js/components/inventory_ui.js"></script>
    <script src="../../js/data/dialogs.js"></script>
    <script src="../../js/components/dialog.js"></script>
    <script src="../../js/components/dynamic_loading.js"></script>
    <script>
        function openTabletWithNarrative() {
            if (window.GameState) window.GameState.setFlag('tablet_found');
            if (window.TabletWidget && window.TabletWidget.toggle) {
                window.TabletWidget.toggle();
            }
        }

        // Bureau Logic
        function openBureau() {
            const overlay = document.getElementById('bureau-overlay');
            const container = document.getElementById('bureau-container');
            const hitbox = document.getElementById('usb-hitbox');

            overlay.style.display = 'flex';

            if (Inventory.hasItem('usb_stick')) {
                container.style.backgroundImage = "url('../../assets/rooms/crime_scene_bureau.png')";
                hitbox.style.display = 'none';
            } else {
                container.style.backgroundImage = "url('../../assets/rooms/crime_scene_bureau_USB.png')";
                hitbox.style.display = 'block';
            }
        }

        function closeBureau() {
            document.getElementById('bureau-overlay').style.display = 'none';
        }

        function pickupUSB() {
            if (Inventory.addItem('usb_stick')) {
                // Show the image without the USB
                document.getElementById('bureau-container').style.backgroundImage = "url('../../assets/rooms/crime_scene_bureau.png')";
                document.getElementById('usb-hitbox').style.display = 'none';
                
                // Optional: Show a dialog that you found it
                if (window.showDialog) {
                    window.showDialog("You found a USB stick on the desk. It might contain important data.");
                } else if (window.DialogEngine) {
                    window.DialogEngine.playSequence([
                        { speaker: "Detective", text: "A USB stick... This might have the files I need." }
                    ]);
                }
            }
        }
    </script>
</body>
</html>
