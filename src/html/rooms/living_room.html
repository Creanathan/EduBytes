<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Living Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/rooms.css">
    <style>
        .room-background { background-image: url('../../assets/rooms/living_room.png'); }
        #obj-piano  { bottom: 20%; left: 10%;  width: 35%; height: 50%; }
        /* Door leads to Nanny's Room per Interacties met locaties.docx */
        #obj-door   { top: 25%;   right: 10%; width: 15%; height: 60%; }

        /* Thomas Souvellier sprite */
        #obj-thomas {
            top: 20%; left: 55%; width: 18%; height: 80%;
            background: transparent; overflow: hidden; border: none;
        }
        #obj-thomas:hover { border: none; background: transparent; }
        #obj-thomas img {
            width: 100%; height: 100%;
            object-fit: cover; object-position: center top;
            mix-blend-mode: screen;
            mask-image: radial-gradient(ellipse 40% 55% at 50% 30%, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 40% 55% at 50% 30%, black 20%, transparent 70%);
            filter: brightness(0.9) contrast(1.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        #obj-thomas:hover img { filter: brightness(1.2) contrast(1.1); transform: scale(1.02); }
    </style>
</head>
<body>
<div class="room-background"></div>
<h1>Living Room</h1>

<div class="interactable-layer">
    <div id="obj-piano"  class="clickable-object" onclick="showInteraction('piano')" title="Grand Piano"></div>
    <div id="obj-door"   class="clickable-object" onclick="handleDoorClick()"        title="Nanny's Room Door"></div>
    <!-- Thomas Souvellier sprite -->
    <div id="obj-thomas" class="clickable-object" onclick="showInteraction('thomas')" title="Thomas Souvellier">
        <img src="../../assets/images/characters/thomas.png" alt="Thomas Souvellier">
    </div>
</div>

<div id="dialog-container"></div>

<!-- Navigation — per Interacties met locaties.docx -->
<!-- Right → Hallway (always open) -->
<button class="btn btn-primary ui-button position-fixed top-50 end-0 translate-middle-y me-3"
        id="btn-right" onclick="goToLocation('hallway.html')">></button>

<!-- Small Up button near door → Nanny's Room (requires nannys_key) -->
<!-- Positioned near the top-right door area -->
<button class="btn btn-secondary ui-button position-fixed"
        id="btn-top"
        style="top: 20%; right: 12%; width: 36px; height: 36px; font-size: 0.9rem;"
        onclick="goToLocation('nannys_room.html', 'nannys_key')">^</button>

<script>
    function handleDoorClick() {
        if (window.Inventory && window.Inventory.hasItem('nannys_key')) {
            showInteraction('door_nannys_room_unlocked');
        } else {
            showInteraction('door_nannys_room');
        }
    }
</script>

<script src="../../js/services/gamestate.js"></script>
<script src="../../js/components/movement.js"></script>
<script src="../../js/components/audio.js"></script>
<script src="../../js/components/tablet_widget.js"></script>
<script src="../../js/services/inventory.js"></script>
<script src="../../js/components/inventory_ui.js"></script>
<script src="../../js/data/dialogs.js"></script>
<script src="../../js/components/dialog.js"></script>
<script src="../../js/components/dynamic_loading.js"></script>
</body>
</html>
