<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nursery Room</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../../css/rooms.css">
    <style>
        .room-background { background-image: url('../../assets/rooms/nursery.png'); }
        #obj-cradle  { top: 45%; left: 32%; width: 35%; height: 45%; }
        #obj-picture { top: 22%; right: 4%; width: 15%; height: 28%; }

        /* Beatrix Lémur sprite */
        #obj-beatrix {
            top: 15%; right: 18%; width: 16%; height: 80%;
            background: transparent; overflow: hidden; border: none;
        }
        #obj-beatrix:hover { border: none; background: transparent; }
        #obj-beatrix img {
            width: 100%; height: 100%;
            object-fit: cover; object-position: center top;
            mix-blend-mode: screen;
            mask-image: radial-gradient(ellipse 40% 55% at 50% 30%, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse 40% 55% at 50% 30%, black 20%, transparent 70%);
            filter: brightness(0.9) contrast(1.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        #obj-beatrix:hover img { filter: brightness(1.2) contrast(1.1); transform: scale(1.02); }
    </style>
</head>
<body>
<div class="room-background"></div>
<h1>Nursery</h1>

<div class="interactable-layer">
    <div id="obj-cradle"  class="clickable-object" onclick="showInteraction('cradle')"        title="Wooden Cradles"></div>
    <div id="obj-picture" class="clickable-object" onclick="showInteraction('family_picture')" title="Family Picture"></div>
    <!-- Beatrix Lémur sprite -->
    <div id="obj-beatrix" class="clickable-object" onclick="handleBeatrixClick()"              title="Beatrix Lémur">
        <img src="../../assets/images/characters/beatrix.png" alt="Beatrix Lémur">
    </div>
</div>

<div id="dialog-container"></div>

<!-- Navigation — per Interacties met locaties.docx -->
<!-- Left → Hallway (always open) -->
<button class="btn btn-primary ui-button position-fixed top-50 start-0 translate-middle-y ms-3"
        id="btn-left" onclick="goToLocation('hallway.html')"><</button>

<script>
    // Beatrix has two states: introduction, and subsequent interactions
    function handleBeatrixClick() {
        if (window.GameState && window.GameState.hasFlag('talked_to_beatrix')) {
            showInteraction('beatrix'); // shows second variant (repeat)
        } else {
            // First interaction → show intro then offer "And you are?"
            showInteraction('beatrix');
        }
    }
</script>

<script src="../../js/services/gamestate.js"></script>
<script src="../../js/components/movement.js"></script>
<script src="../../js/components/audio.js"></script>
<script src="../../js/components/tablet_widget.js"></script>
<script src="../../js/services/inventory.js"></script>
<script src="../../js/components/inventory_ui.js"></script>
<script src="../../js/data/dialogs.js"></script>
<script src="../../js/components/dialog.js"></script>
<script src="../../js/components/dynamic_loading.js"></script>
</body>
</html>
